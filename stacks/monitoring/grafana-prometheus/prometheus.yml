global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # node-exporter runs on host network, so we reach it via the Docker host IP
  - job_name: "node"
    static_configs:
      - targets: ["host.docker.internal:9100"]

  # Add more targets here as you bring up more stacks
  # - job_name: "traefik"
  #   static_configs:
  #     - targets: ["traefik:8080"]
